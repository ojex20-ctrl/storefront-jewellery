<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="goldB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6B8"/>
      <stop offset="25%" stop-color="#E8C76A"/>
      <stop offset="50%" stop-color="#D4A84B"/>
      <stop offset="75%" stop-color="#C49A3C"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
    <linearGradient id="goldBHi" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF8E0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFF8E0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF8E0" stop-opacity="0"/>
    </linearGradient>
    <filter id="braceletGlow">
      <feGaussianBlur stdDeviation="5" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="250" cy="380" rx="150" ry="25" fill="#000" opacity="0.12"/>
  <!-- Main chain links -->
  <g filter="url(#braceletGlow)">
    <!-- Link 1 -->
    <ellipse cx="80" cy="240" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(-15, 80, 240)"/>
    <!-- Link 2 -->
    <ellipse cx="130" cy="225" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(-5, 130, 225)"/>
    <!-- Link 3 -->
    <ellipse cx="180" cy="220" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(5, 180, 220)"/>
    <!-- Link 4 -->
    <ellipse cx="230" cy="225" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(10, 230, 225)"/>
    <!-- Link 5 (center) -->
    <ellipse cx="280" cy="235" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(15, 280, 235)"/>
    <!-- Link 6 -->
    <ellipse cx="330" cy="250" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(20, 330, 250)"/>
    <!-- Link 7 -->
    <ellipse cx="380" cy="270" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(30, 380, 270)"/>
    <!-- Link 8 -->
    <ellipse cx="420" cy="295" rx="22" ry="35" stroke="url(#goldB)" stroke-width="8" fill="none" transform="rotate(40, 420, 295)"/>
  </g>
  <!-- Specular highlights on each link -->
  <g opacity="0.4">
    <ellipse cx="80" cy="230" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(-15, 80, 230)"/>
    <ellipse cx="130" cy="215" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(-5, 130, 215)"/>
    <ellipse cx="180" cy="210" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(5, 180, 210)"/>
    <ellipse cx="230" cy="215" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(10, 230, 215)"/>
    <ellipse cx="280" cy="225" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(15, 280, 225)"/>
    <ellipse cx="330" cy="240" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(20, 330, 240)"/>
    <ellipse cx="380" cy="260" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(30, 380, 260)"/>
    <ellipse cx="420" cy="285" rx="8" ry="12" fill="url(#goldBHi)" transform="rotate(40, 420, 285)"/>
  </g>
  <!-- Clasp -->
  <rect x="52" y="225" width="18" height="30" rx="5" fill="url(#goldB)" stroke="#C49A3C" stroke-width="1.5" transform="rotate(-20, 61, 240)"/>
</svg>
