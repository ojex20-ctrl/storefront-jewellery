<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6B8"/>
      <stop offset="30%" stop-color="#D4A84B"/>
      <stop offset="50%" stop-color="#E8C76A"/>
      <stop offset="70%" stop-color="#C49A3C"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C49A3C"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#A07828"/>
    </linearGradient>
    <radialGradient id="diamond" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#E8F0FF"/>
      <stop offset="60%" stop-color="#B8D0F0"/>
      <stop offset="100%" stop-color="#8BACDB"/>
    </radialGradient>
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="8" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="diamondSparkle">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="250" cy="420" rx="120" ry="20" fill="#000" opacity="0.15" filter="url(#ringGlow)"/>
  <!-- Ring band outer -->
  <ellipse cx="250" cy="260" rx="140" ry="90" stroke="url(#goldRing)" stroke-width="32" fill="none" filter="url(#ringGlow)"/>
  <!-- Ring band inner highlight -->
  <ellipse cx="250" cy="260" rx="140" ry="90" stroke="url(#goldInner)" stroke-width="12" fill="none" opacity="0.4"/>
  <!-- Specular highlight on band -->
  <path d="M140 220 Q180 190 250 185 Q320 190 360 220" stroke="#FFF8E0" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M160 300 Q200 320 250 325 Q300 320 340 300" stroke="#FFF8E0" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Diamond setting base -->
  <polygon points="250,155 270,180 250,195 230,180" fill="url(#goldRing)" stroke="#C49A3C" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="250,130 275,165 250,190 225,165" fill="url(#diamond)" filter="url(#diamondSparkle)"/>
  <!-- Diamond facets -->
  <line x1="250" y1="130" x2="250" y2="190" stroke="white" stroke-width="0.8" opacity="0.5"/>
  <line x1="225" y1="165" x2="275" y2="165" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="250" y1="130" x2="225" y2="165" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="130" x2="275" y2="165" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <!-- Sparkle points -->
  <circle cx="245" cy="145" r="2" fill="white" opacity="0.9"/>
  <circle cx="260" cy="155" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="240" cy="170" r="1" fill="white" opacity="0.5"/>
</svg>
