<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;padding:40px 20px;background:#fafafa;">
  <div style="background:white;padding:40px;border:1px solid #eee;">
    <h1 style="font-size:24px;color:#0a0a0a;margin:0 0 20px;">Order Update</h1>
    <p style="color:#333;font-size:15px;">Hi {{firstName}},</p>
    <p style="color:#555;font-size:14px;">Your order <strong>{{orderNumber}}</strong> has been updated:</p>
    <div style="margin:20px 0;padding:16px;background:#f5f3ee;border-left:4px solid #C2B9A7;">
      <p style="margin:0;font-size:16px;font-weight:600;color:#0a0a0a;">Status: {{status}}</p>
    </div>
    <p style="color:#555;font-size:14px;">Thank you for shopping with SYRA!</p>
  </div>
  <p style="text-align:center;color:#999;font-size:11px;margin-top:20px;">© SYRA Jewellery</p>
</body></html>
